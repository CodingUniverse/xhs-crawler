version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: xhs_crawler_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crawler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crawler123}
      POSTGRES_DB: ${POSTGRES_DB:-crawler_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crawler}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xhs_crawler_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: xhs_crawler_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-crawler}:${POSTGRES_PASSWORD:-crawler123}@postgres:5432/${POSTGRES_DB:-crawler_db}
      - REDIS_URL=redis://redis:6379
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - NEXT_PUBLIC_API_URL=
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8005:8000"
    restart: unless-stopped
    networks:
      - crawler_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: xhs_crawler_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8005
      - NEXT_PUBLIC_API_BASE=/api
    depends_on:
      - backend
    ports:
      - "3005:3000"
    restart: unless-stopped
    networks:
      - crawler_network

networks:
  crawler_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
